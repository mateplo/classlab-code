# Scans de sécurité. Déclenché sur PR (gate avant merge), push (trace sur les branches
# d'env) et schedule (re-scan périodique : attrape les nouvelles CVE sur du code inchangé).
name: security

on:
  pull_request:
  push:
    branches: [master, main, dev, staging]
  schedule:
    - cron: "0 4 * * 1"   # lundis 04:00 UTC

permissions:
  contents: read

jobs:
  # --- SAST : analyse statique du code JS/TS ---
  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3

  # --- Scan des dépendances + mauvaises configs (lit les package-lock.json + Dockerfiles) ---
  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          format: table
          # report-only au départ : ce projet (Node 12, vieilles deps) a beaucoup de CVE.
          # Passe à "1" quand tu veux FAIRE ÉCHOUER la PR sur des vulnérabilités.
          exit-code: "0"

  # --- Scan des IMAGES buildées (couche OS du base image + app) ---
  # Seulement push/schedule : l'image existe alors sur GHCR. Sur PR, l'image de la PR
  # n'est pas encore poussée -> le scan `fs` (deps) ci-dessus suffit avant merge.
  # github.ref_name = la branche (push) ou la branche par défaut (schedule) -> bon tag.
  trivy-image:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - udagram-frontend
          - udagram-restapi-user
          - udagram-restapi-feed
          - udagram-restapi-image-filter
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.ref_name }}
          severity: HIGH,CRITICAL
          format: table
          exit-code: "0"   # report-only ; passe à "1" pour bloquer sur CVE

  # --- Détection de secrets committés ---
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # historique complet pour scanner tous les commits
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
