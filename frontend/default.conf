# Conf nginx du frontend Angular/Ionic (SPA). Le routage est côté client : /home,
# /upload, etc. n'existent pas comme fichiers sur disque. Sans fallback, un accès
# direct ou un refresh sur ces routes renvoie 404. try_files ... /index.html sert
# index.html pour tout chemin non-fichier -> le routeur Angular prend le relais.
# (Le /api/v0 est routé par le reverseproxy en amont, pas par ce serveur.)
server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
