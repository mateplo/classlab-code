# Scans de sécurité. Déclenché sur PR (gate avant merge), push (trace sur les branches
# d'env) et schedule (re-scan périodique : attrape les nouvelles CVE sur du code inchangé).
name: security

on:
  pull_request:
    branches: [master, main, dev, staging]
  push:
    branches: [master, main, dev, staging]
  schedule:
    - cron: "0 4 * * 1"   # lundis 04:00 UTC

permissions:
  contents: read

jobs:
  # --- SAST : analyse statique du code JS/TS ---
  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3

  # --- Scan des dépendances + mauvaises configs (lit les package-lock.json + Dockerfiles) ---
  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          format: table
          # report-only au départ : ce projet (Node 12, vieilles deps) a beaucoup de CVE.
          # Passe à "1" quand tu veux FAIRE ÉCHOUER la PR sur des vulnérabilités.
          exit-code: "0"

  # NB : le scan des IMAGES est dans build.yaml (job `trivy-image`, needs: build) : il doit
  # tourner APRÈS le build, et `needs:` ne traverse pas les fichiers workflow.

  # --- Détection de secrets committés ---
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # historique complet pour scanner tous les commits
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- Re-scan HEBDO des images en registre (nouvelles CVE sur images inchangées) ---
  # Ne tourne QU'AU SCHEDULE (lundi 4h). Le scan post-build (frais) est dans build.yaml.
  # Matrice image x env : re-scanne les images déployées des 3 environnements.
  trivy-image-scheduled:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - udagram-frontend
          - udagram-restapi-user
          - udagram-restapi-feed
          - udagram-restapi-image-filter
        tag: [dev, staging, master]
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ matrix.tag }}
          severity: HIGH,CRITICAL
          format: table
          exit-code: "0"   # report-only ; passe à "1" pour bloquer sur CVE
