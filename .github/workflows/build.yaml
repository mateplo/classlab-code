# Build + push des images Udagram vers GHCR. Le reverseproxy n'est PAS buildé
# (nginx stock + conf en ConfigMap côté classlab-k8s).
# Tags : sha-court (toujours), `latest` (sur la branche par défaut, suivi par dev/staging),
# sémver `X.Y.Z` (sur tag git `vX.Y.Z`, suivi par prod). Argo CD Image Updater lit ces tags.
name: build-and-push

on:
  push:
    branches: [master, main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: udagram-frontend
            context: ./frontend
          - image: udagram-restapi-user
            context: ./backend/restapi-user
          - image: udagram-restapi-feed
            context: ./backend/restapi-feed
          - image: udagram-restapi-image-filter
            context: ./backend/restapi-image-filter
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
