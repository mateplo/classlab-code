# Build + push des images Udagram vers GHCR, SÉPARÉ PAR BRANCHE.
# Chaque push produit 2 tags : `<branche>-<sha>` (immuable, ce qu'Image Updater épingle)
# et `<branche>` (mutable, tag de bootstrap des overlays).
#   dev     -> udagram-*:dev-<sha>      -> env dev
#   staging -> udagram-*:staging-<sha>  -> env staging
#   master  -> udagram-*:master-<sha>   -> env prod
# Le reverseproxy n'est pas buildé (nginx stock + conf en ConfigMap côté classlab-k8s).
name: build-and-push

on:
  push:
    branches: [master, main, dev, staging]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { image: udagram-frontend, context: ./frontend }
          - { image: udagram-restapi-user, context: ./backend/restapi-user }
          - { image: udagram-restapi-feed, context: ./backend/restapi-feed }
          - { image: udagram-restapi-image-filter, context: ./backend/restapi-image-filter }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: SHA court
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          # 2 tags par image. github.ref_name = la branche poussée (dev / staging / master).
          #   <branche>-<sha7>  = tag unique (traçable)
          #   <branche>         = tag mobile "dernière de la branche"
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.ref_name }}-${{ env.SHORT_SHA }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.ref_name }}

  # Ménage post-build : après le push, on ne garde que les 3 dernières images de l'env
  # qui vient d'être poussé (github.ref_name). Pas de cron -> la purge suit les builds.
  # Le tag mutable <branche> (sans tiret) ne matche pas "<branche>-*" -> protégé.
  cleanup:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: snok/container-retention-policy@v3.0.0
        with:
          # Compte PERSO -> littéralement "user" (endpoint /user/packages), pas "mateplo".
          # Pour une org, on mettrait le nom de l'org à la place.
          account: user
          # snok exige un PAT CLASSIQUE (ghp_) avec delete:packages : le GITHUB_TOKEN
          # (ghs_) est refusé pour supprimer des packages. -> secret GHCR_CLEANUP_TOKEN.
          token: ${{ secrets.GHCR_CLEANUP_TOKEN }}
          image-names: "udagram-frontend udagram-restapi-user udagram-restapi-feed udagram-restapi-image-filter"
          image-tags: "${{ github.ref_name }}-*"
          keep-n-most-recent: 3
          # cut-off OBLIGATOIRE en v3 (âge min pour être supprimable). Petit -> keep-n=3
          # pilote. Les 3 plus récentes sont TOUJOURS gardées (dont l'image déployée).
          cut-off: 1h
          dry-run: true   # <-- passe à false après vérification
